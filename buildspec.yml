version: 0.2

env:
  git-credential-helper: yes
  parameter-store:
    DOCKERHUB_USERNAME: /DockerHub/UserName
    DOCKERHUB_ACCESSTOKEN: /DockerHub/AccessToken
  variables:
    REGION: ap-northeast-1

phases:
  install:
    runtime-versions:
      python: 3.13
  pre_build:
    commands:
      # Fetch git submodules (required for CODEBUILD_CLONE_REF source)
      - git submodule sync
      - git submodule update --init
      # DockerHub authentication
      - echo "$DOCKERHUB_ACCESSTOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      # Download NNUE eval file
      - curl -LS -o nn.7z https://github.com/yaneurao/YaneuraOu/releases/download/suisho5/Suisho5.7z
      - 7z x nn.7z
      - mkdir -p worker/Engine/eval
      - mv nn.bin worker/Engine/eval/
      # Adjust Makefile for Lambda environment (clang++ -> g++, AVX2 -> SSE42)
      - sed -i 's/^COMPILER = clang++/#COMPILER = clang++/' worker/YaneuraOu/source/Makefile
      - sed -i 's/^#COMPILER = g++/COMPILER = g++/' worker/YaneuraOu/source/Makefile
      - sed -i 's/^TARGET_CPU = AVX2/#TARGET_CPU = AVX2/' worker/YaneuraOu/source/Makefile
      - sed -i 's/^#TARGET_CPU = SSE42/TARGET_CPU = SSE42/' worker/YaneuraOu/source/Makefile
  build:
    commands:
      - sam build
      - >-
        sam deploy
        --stack-name stack-sgp-${ENV}-backend-analysis
        --no-confirm-changeset
        --no-fail-on-empty-changeset
        --resolve-s3
        --resolve-image-repos
        --parameter-overrides Env=$ENV
        --capabilities CAPABILITY_NAMED_IAM
        --region ${REGION}
